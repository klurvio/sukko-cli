services:
  # --- Sukko Platform Services (always on) ---

  provisioning:
    image: ghcr.io/klurvio/sukko-provisioning:latest
    ports:
      - "8080:8080"
    environment:
      ADMIN_TOKEN: sukko-dev-token
      HMAC_SECRET: "sukko-dev-secret-minimum-32-bytes!!"
      NATS_JETSTREAM_URLS: nats://nats:4222
      BROADCAST_TYPE: nats
      NATS_URL: nats://nats:4222
      DATABASE_PATH: /tmp/sukko.db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      nats:
        condition: service_started
    restart: unless-stopped

  ws-gateway:
    image: ghcr.io/klurvio/sukko-gateway:latest
    ports:
      - "3000:3000"
    environment:
      ADMIN_TOKEN: sukko-dev-token
      HMAC_SECRET: "sukko-dev-secret-minimum-32-bytes!!"
      NATS_JETSTREAM_URLS: nats://nats:4222
      BROADCAST_TYPE: nats
      NATS_URL: nats://nats:4222
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      nats:
        condition: service_started
    restart: unless-stopped

  ws-server:
    image: ghcr.io/klurvio/sukko-server:latest
    ports:
      - "3005:3005"
    environment:
      ADMIN_TOKEN: sukko-dev-token
      HMAC_SECRET: "sukko-dev-secret-minimum-32-bytes!!"
      NATS_JETSTREAM_URLS: nats://nats:4222
      BROADCAST_TYPE: nats
      NATS_URL: nats://nats:4222
      NATS_URLS: nats://nats:4222
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      nats:
        condition: service_started
    restart: unless-stopped

  sukko-tester:
    image: ghcr.io/klurvio/sukko-tester:latest
    ports:
      - "8090:8090"
    environment:
      ADMIN_TOKEN: sukko-dev-token
      HMAC_SECRET: "sukko-dev-secret-minimum-32-bytes!!"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # --- Infrastructure (always on) ---

  nats:
    image: nats:latest
    ports:
      - "4222:4222"
    command: ["-js"]
    restart: unless-stopped

  # --- Infrastructure (profiled) ---
  # Activate via: docker compose --profile <name> up

  postgres:
    image: postgres:16
    profiles: [postgres]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sukko
      POSTGRES_PASSWORD: sukko
      POSTGRES_DB: sukko_provisioning
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sukko"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  valkey:
    image: valkey/valkey:latest
    profiles: [valkey]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # kafka and redpanda are mutually exclusive — both use port 9092.

  kafka:
    image: bitnami/kafka:latest
    profiles: [kafka]
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redpanda:
    image: redpandadata/redpanda:latest
    profiles: [redpanda]
    ports:
      - "9092:9092"
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=256M
      - --overprovisioned
      - --kafka-addr=0.0.0.0:9092
      - --advertise-kafka-addr=redpanda:9092
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
