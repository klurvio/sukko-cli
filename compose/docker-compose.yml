# Sukko WebSocket Infrastructure — Local Development
#
# SOURCE OF TRUTH: This file is the canonical docker-compose definition.
# It is automatically synced to sukko-cli (compose/docker-compose.yml) via CI,
# where build: blocks are transformed to image: references for end users.
# See: .github/workflows/sync-compose.yml
#
# Why here and not in sukko-cli?
# The compose file is coupled to the Go codebase — env var names, ports, healthcheck
# paths, and service topology must match the Go config contract (platform.BaseConfig,
# ServerConfig, etc.). Keeping it alongside the code ensures changes to the config
# contract and compose file happen in the same PR.
#
# Start: docker compose up
# Stop:  docker compose down
# Reset: docker compose down -v
#
# Default mode: direct + NATS broadcast + PostgreSQL (zero config needed)
# All application config uses Go envDefault values.
# Only inter-service wiring env vars are set here.
#
# Optional infrastructure (activate via Docker Compose profiles):
#   docker compose --profile kafka up         # Redpanda (Kafka)
#   docker compose --profile valkey up        # Valkey (Redis-compatible)
#   docker compose --profile kafka --profile valkey up  # combine profiles

services:
  # ─── NATS (broadcast bus) ──────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4222"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
  # ─── Provisioning API ─────────────────────────────────────────────
  provisioning:
    image: ghcr.io/klurvio/sukko-provisioning:latest
    ports:
      - "18080:8080"
      - "19090:9090"
    environment:
      ADMIN_BOOTSTRAP_KEY: "${ADMIN_BOOTSTRAP_KEY:-}" # base64 Ed25519 public key, set by sukko init
      CREDENTIALS_ENCRYPTION_KEY: "${CREDENTIALS_ENCRYPTION_KEY:-}" # 32-byte hex key, auto-generated by sukko init
      DATABASE_URL: "postgres://sukko:sukko@postgres:5432/sukko?sslmode=disable"
      SUKKO_LICENSE_KEY: "${SUKKO_LICENSE_KEY:-}"
      # Observability (disabled by default, enable with OTEL_TRACING_ENABLED=true)
      OTEL_TRACING_ENABLED: "${OTEL_TRACING_ENABLED:-false}"
      OTEL_EXPORTER_ENDPOINT: "tempo:4317"
      PPROF_ENABLED: "${PPROF_ENABLED:-false}"
      PYROSCOPE_ENABLED: "${PYROSCOPE_ENABLED:-false}"
      PYROSCOPE_ADDR: "http://pyroscope:4040"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
  # ─── WebSocket Server ─────────────────────────────────────────────
  ws-server:
    image: ghcr.io/klurvio/sukko-server:latest
    ports:
      - "3005:3005"
    environment:
      # Inter-service wiring (only overrides needed)
      NATS_URLS: "nats://nats:4222"
      PROVISIONING_GRPC_ADDR: "provisioning:9090"
      SUKKO_LICENSE_KEY: "${SUKKO_LICENSE_KEY:-}"
      # Observability (disabled by default, enable with OTEL_TRACING_ENABLED=true)
      OTEL_TRACING_ENABLED: "${OTEL_TRACING_ENABLED:-false}"
      OTEL_EXPORTER_ENDPOINT: "tempo:4317"
      PPROF_ENABLED: "${PPROF_ENABLED:-false}"
      PYROSCOPE_ENABLED: "${PYROSCOPE_ENABLED:-false}"
      PYROSCOPE_ADDR: "http://pyroscope:4040"
    depends_on:
      nats:
        condition: service_healthy
      provisioning:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3005/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
  # ─── WebSocket Gateway ────────────────────────────────────────────
  ws-gateway:
    image: ghcr.io/klurvio/sukko-gateway:latest
    ports:
      - "13000:3000"
    environment:
      # Inter-service wiring (only overrides needed)
      GATEWAY_BACKEND_URL: "ws://ws-server:3005/ws"
      PROVISIONING_GRPC_ADDR: "provisioning:9090"
      SERVER_GRPC_ADDR: "ws-server:3006"
      PUSH_GRPC_ADDR: "push-service:3008"
      SUKKO_LICENSE_KEY: "${SUKKO_LICENSE_KEY:-}"
      # Observability (disabled by default, enable with OTEL_TRACING_ENABLED=true)
      OTEL_TRACING_ENABLED: "${OTEL_TRACING_ENABLED:-false}"
      OTEL_EXPORTER_ENDPOINT: "tempo:4317"
      PPROF_ENABLED: "${PPROF_ENABLED:-false}"
      PYROSCOPE_ENABLED: "${PYROSCOPE_ENABLED:-false}"
      PYROSCOPE_ADDR: "http://pyroscope:4040"
    depends_on:
      ws-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
  # ─── Push Service — activate with: --profile enterprise --profile kafka ──
  push-service:
    profiles: ["enterprise"]
    ports:
      - "3008:3008"
      - "3009:3009"
    environment:
      PUSH_DRY_RUN: "true"
      MESSAGE_BACKEND: kafka
      DATABASE_URL: "postgres://sukko:sukko@postgres:5432/sukko?sslmode=disable"
      PROVISIONING_GRPC_ADDR: "provisioning:9090"
      KAFKA_BROKERS: "redpanda:9092"
      PUSH_GRPC_PORT: "3008"
      PUSH_HTTP_PORT: "3009"
      ENVIRONMENT: local
      SUKKO_LICENSE_KEY: "${SUKKO_LICENSE_KEY:-}"
    depends_on:
      provisioning:
        condition: service_healthy
      redpanda:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3009/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
  # ─── Tester Service ────────────────────────────────────────────────
  sukko-tester:
    image: ghcr.io/klurvio/sukko-tester:latest
    ports:
      - "8090:8090"
    environment:
      GATEWAY_URL: "ws://ws-gateway:3000"
      PROVISIONING_URL: "http://provisioning:8080"
      TESTER_AUTH_TOKEN: "sukko-dev-token"
    depends_on:
      ws-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
  # ─── Redpanda (Kafka) — activate with: --profile kafka ─────────────
  redpanda:
    profiles: ["kafka"]
    image: redpandadata/redpanda:v24.1.1
    ports:
      - "19092:19092"
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --kafka-addr=0.0.0.0:9092
      - --advertise-kafka-addr=redpanda:9092
      - --pandaproxy-addr=0.0.0.0:8082
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 3s
      retries: 10
  # ─── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: sukko
      POSTGRES_PASSWORD: sukko
      POSTGRES_DB: sukko
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sukko"]
      interval: 5s
      timeout: 3s
      retries: 5
  # ─── Valkey — activate with: --profile valkey ───────────────────────
  valkey:
    profiles: ["valkey"]
    image: valkey/valkey:7.2-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  # ─── Observability stack — activate with: --profile observability ────
  # Adds Prometheus, Grafana, Tempo (tracing), Pyroscope (profiling),
  # and AlertManager. All configs inlined via docker compose configs.
  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.47.0
    ports:
      - "19091:9090"
    configs:
      - source: prometheus-config
        target: /etc/prometheus/prometheus.yml
      - source: prometheus-alert-rules
        target: /etc/prometheus/rules/alert-rules.yml
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 5
  grafana:
    profiles: ["observability"]
    image: grafana/grafana:10.2.0
    ports:
      - "3030:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    configs:
      - source: grafana-datasources
        target: /etc/grafana/provisioning/datasources/datasources.yaml
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 5
  tempo:
    profiles: ["observability"]
    image: grafana/tempo:2.3.1
    ports:
      - "3200:3200"
      - "14317:4317"
    configs:
      - source: tempo-config
        target: /etc/tempo/tempo.yml
    command: ["-config.file=/etc/tempo/tempo.yml"]
  pyroscope:
    profiles: ["observability"]
    image: grafana/pyroscope:1.4.0
    ports:
      - "4040:4040"
  alertmanager:
    profiles: ["observability"]
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    configs:
      - source: alertmanager-config
        target: /etc/alertmanager/alertmanager.yml
    command: ["--config.file=/etc/alertmanager/alertmanager.yml"]
# ─── Inline configs for observability stack ──────────────────────────
configs:
  prometheus-config:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s
      rule_files:
        - /etc/prometheus/rules/*.yml
      alerting:
        alertmanagers:
          - static_configs:
              - targets: ['alertmanager:9093']
      scrape_configs:
        - job_name: ws-server
          static_configs:
            - targets: ['ws-server:3005']
          metrics_path: /metrics
        - job_name: ws-gateway
          static_configs:
            - targets: ['ws-gateway:3000']
          metrics_path: /metrics
        - job_name: provisioning
          static_configs:
            - targets: ['provisioning:8080']
          metrics_path: /metrics
        - job_name: prometheus
          static_configs:
            - targets: ['localhost:9090']
  # Keep in sync with deployments/helm/sukko/charts/monitoring/templates/prometheus-alert-rules-configmap.yaml
  prometheus-alert-rules:
    content: |
      groups:
        - name: sukko-capacity
          rules:
            - alert: HighConnectionCapacity
              expr: ws_connections_active / ws_connections_max > 0.8
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "Connection capacity above 80%"
                runbook_url: "https://docs.sukko.dev/runbooks/high-connection-capacity"
            - alert: CriticalConnectionCapacity
              expr: ws_connections_active / ws_connections_max > 0.95
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "Connection capacity above 95%"
                runbook_url: "https://docs.sukko.dev/runbooks/critical-connection-capacity"
        - name: sukko-errors
          rules:
            - alert: HighErrorRate
              expr: rate(ws_errors_total[5m]) > 0.01 * rate(ws_messages_received_total[5m])
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "Error rate exceeds 1% of message throughput"
                runbook_url: "https://docs.sukko.dev/runbooks/high-error-rate"
        - name: sukko-infrastructure
          rules:
            - alert: KafkaConsumerLag
              expr: ws_kafka_consumer_lag > 1000
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "Kafka consumer lag exceeds 1000 messages"
                runbook_url: "https://docs.sukko.dev/runbooks/kafka-consumer-lag"
            - alert: HighMemoryUsage
              expr: ws_memory_bytes / ws_memory_limit_bytes > 0.8
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "Memory usage above 80% of limit"
                runbook_url: "https://docs.sukko.dev/runbooks/high-memory-usage"
            - alert: LicenseExpiringSoon
              expr: (sukko_license_expiry_timestamp - time()) < 7 * 86400
              for: 1h
              labels:
                severity: warning
              annotations:
                summary: "License expires within 7 days"
                runbook_url: "https://docs.sukko.dev/runbooks/license-expiring-soon"
            - alert: ServiceDown
              expr: up{job=~"ws-server|ws-gateway|provisioning"} == 0
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "{{ $$labels.job }} is down"
                runbook_url: "https://docs.sukko.dev/runbooks/service-down"
  tempo-config:
    content: |
      server:
        http_listen_port: 3200
      distributor:
        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: 0.0.0.0:4317
      storage:
        trace:
          backend: local
          local:
            path: /tmp/tempo/blocks
          wal:
            path: /tmp/tempo/wal
      compactor:
        compaction:
          block_retention: 168h
  alertmanager-config:
    content: |
      global:
        resolve_timeout: 5m
      route:
        receiver: console
        group_by: ['alertname', 'severity']
        group_wait: 10s
        group_interval: 5m
        repeat_interval: 1h
      receivers:
        - name: console
  grafana-datasources:
    content: |
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          uid: prometheus
          access: proxy
          url: http://prometheus:9090
          isDefault: true
          editable: false
        - name: Loki
          type: loki
          uid: loki
          access: proxy
          url: http://loki:3100
          editable: false
        - name: Tempo
          type: tempo
          uid: tempo
          access: proxy
          url: http://tempo:3200
          editable: false
        - name: Pyroscope
          type: grafana-pyroscope-datasource
          uid: pyroscope
          access: proxy
          url: http://pyroscope:4040
          editable: false
volumes:
  postgres-data:
